name: gitlab-ci

"on": [push, pull_request, workflow_dispatch]

jobs:
  gitlab-ci:
    runs-on: ubuntu-latest
    # Skip on external forks to avoid exposing the token
    if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    env:
      GITLAB_API: https://iis-git.ee.ethz.ch/api/v4/projects/github-mirror%2Fmagia-sdk-mirror
      GITLAB_REMOTE: https://oauth2:${{ secrets.GITLAB_TOKEN }}@iis-git.ee.ethz.ch/github-mirror/magia-sdk-mirror.git
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push branch to GitLab mirror
        run: |
          git remote add gitlab "$GITLAB_REMOTE"
          git push gitlab HEAD:${{ github.head_ref || github.ref_name }}

      - name: Trigger GitLab pipeline
        run: |
          HTTP_CODE=$(curl -s -o /tmp/gl_response.json -w "%{http_code}" -X POST \
            -H "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"ref": "${{ github.head_ref || github.ref_name }}"}' \
            "$GITLAB_API/pipeline")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::curl failed to trigger GitLab pipeline (HTTP $HTTP_CODE): $(cat /tmp/gl_response.json)"
            exit 1
          fi
          echo "PIPELINE_ID=$(jq -r '.id' /tmp/gl_response.json)" >> $GITHUB_ENV

      - name: Wait for pipeline to finish
        timeout-minutes: 120
        run: |
          while true; do
            HTTP_CODE=$(curl -s -o /tmp/gl_response.json -w "%{http_code}" \
              -H "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
              "$GITLAB_API/pipelines/$PIPELINE_ID")
            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "::error::curl failed to poll GitLab pipeline (HTTP $HTTP_CODE): $(cat /tmp/gl_response.json)"
              exit 1
            fi
            STATUS=$(jq -r '.status' /tmp/gl_response.json)
            echo "Pipeline status: $STATUS"
            case "$STATUS" in
              success|failed|canceled|skipped) break ;;
            esac
            sleep 30
          done
          echo "PIPELINE_STATUS=$STATUS" >> $GITHUB_ENV

      - name: Print logs of failed jobs
        if: env.PIPELINE_STATUS != 'success'
        run: |
          HTTP_CODE=$(curl -s -o /tmp/gl_response.json -w "%{http_code}" \
            -H "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
            "$GITLAB_API/pipelines/$PIPELINE_ID/jobs?scope[]=failed")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::curl failed to list failed jobs (HTTP $HTTP_CODE): $(cat /tmp/gl_response.json)"
            exit 1
          fi
          JOB_IDS=$(jq -r '.[].id' /tmp/gl_response.json)
          for JOB_ID in $JOB_IDS; do
            HTTP_CODE=$(curl -s -o /tmp/gl_job.json -w "%{http_code}" \
              -H "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
              "$GITLAB_API/jobs/$JOB_ID")
            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "::warning::curl failed to fetch job $JOB_ID metadata (HTTP $HTTP_CODE)"
              continue
            fi
            JOB_NAME=$(jq -r '.name' /tmp/gl_job.json)
            echo "::group::Failed job: $JOB_NAME (id=$JOB_ID)"
            HTTP_CODE=$(curl -s -o /tmp/gl_trace.txt -w "%{http_code}" \
              -H "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
              "$GITLAB_API/jobs/$JOB_ID/trace")
            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "::warning::curl failed to fetch trace for job $JOB_ID (HTTP $HTTP_CODE)"
            else
              cat /tmp/gl_trace.txt
            fi
            echo "::endgroup::"
          done

      - name: Fail if pipeline did not succeed
        run: |
          [ "$PIPELINE_STATUS" = "success" ] || exit 1
