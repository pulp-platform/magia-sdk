name: FlatAttention CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  flatatt:
    strategy:
      fail-fast: false
      matrix:
        tiles: [2, 4, 8]
    name: FlatAttention [mesh size ${{ matrix.tiles }}x${{ matrix.tiles }}]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential python3-pip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache RISC-V toolchain
        id: cache-riscv
        uses: actions/cache@v4
        with:
          path: ~/riscv
          key: riscv-gcc-multilib-rv32imc

      - name: Install RISC-V GCC multilib toolchain
        if: steps.cache-riscv.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2024.09.03/riscv32-elf-ubuntu-22.04-gcc-nightly-2024.09.03-nightly.tar.gz -O /tmp/riscv-toolchain.tar.gz
          mkdir -p ~/riscv
          tar -xzf /tmp/riscv-toolchain.tar.gz -C ~/riscv --strip-components=1
          rm /tmp/riscv-toolchain.tar.gz

      - name: Verify toolchain
        run: ~/riscv/bin/riscv32-unknown-elf-gcc --version

      - name: Setup GVSoC
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          make gvsoc_init
          make gvsoc tiles=${{ matrix.tiles }}

      - name: Run FlatAttention tests (tiles=${{ matrix.tiles }})
        run: |
          for s_mult in 4 8 16; do
            s=$(( s_mult * ${{ matrix.tiles }} ))
            for d in 8 16 32; do
              echo "=== tiles=${{ matrix.tiles }} S=$s D=$d ==="
              make flatatt-gen  tiles=${{ matrix.tiles }} s_size=$s d_size=$d
              make flatatt-build tiles=${{ matrix.tiles }}
              make flatatt-run  tiles=${{ matrix.tiles }}
            done
          done
