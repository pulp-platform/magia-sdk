workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

variables:
  MAGIA: './MAGIA'
  RISCV_GCC_BINROOT: /usr/pack/pulpsdk-1.0-kgf/artifactory/pulp-sdk-release/pkg/pulp_riscv_gcc/1.0.16/bin
  PYENV_BINROOT: /home/adequi/.pyenv/bin
  LLVM_DIR: /usr/pack/riscv-1.0-kgf/spatz-llvm-2023.08.10/
  GIT_CLONE_PATH: "$CI_BUILDS_DIR/$CI_CONCURRENT_ID/$CI_PIPELINE_ID/$CI_JOB_ID"
  GIT_STRATEGY: clone
  GIT_CLEAN_FLAGS: "-ffdx"

.export_path:
  before_script:
    - export PATH=$RISCV_GCC_BINROOT:$PATH
    - export PATH=$PYENV_BINROOT:$PATH
    - export LLVM_INSTALL_DIR=$LLVM_DIR

stages:
  - clone
  - python_setup
  - build_tiles_4
  - test_tiles_4
  - compare_tiles_4
  - build_tiles_1
  - test_tiles_1
  - compare_tiles_1
  - postscript

python_gvsoc:
  extends: [.base, .export_path]
  stage: python_setup
  variables:
    UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  script:
    - eval "$(pyenv init -)"
    - pyenv local 3.12
    - python -m venv gvsoc_venv
    - source gvsoc_venv/bin/activate && pip install uv
    - source gvsoc_venv/bin/activate && uv pip install .
  artifacts:
    paths: [ "gvsoc_venv" ]


.base:
 artifacts:
  when: always
  expire_in: 4 week


clone_magia:
  extends: .base
  stage: clone
  script:
    - source scripts/deps.env
    - git clone https://github.com/pulp-platform/MAGIA.git
    - cd MAGIA && git fetch origin "$MAGIA_COMMIT" && git checkout "$MAGIA_COMMIT"
  artifacts:
    paths: [ "MAGIA" ]

clone_gvsoc:
  extends: .base
  stage: clone
  script:
    - make gvsoc_init
  artifacts:
    paths: [ "gvsoc" ]

.gvsoc:
  extends: [.base]
  script:
    - source gvsoc_venv/bin/activate && make gvsoc tiles=${tiles}
  artifacts:
    paths: [ "gvsoc/install" , "gvsoc/pulp/pulp/chips/magia_v2/arch.py"]

gvsoc_tiles_4:
  extends: .gvsoc
  stage: build_tiles_4
  variables:
    tiles: 4
  artifacts:
    paths: [ "gvsoc/install" ]
  dependencies:
    - clone_gvsoc
    - python_gvsoc

gvsoc_tiles_1:
  extends: .gvsoc
  stage: build_tiles_1
  variables:
    tiles: 1
  artifacts:
    paths: [ "gvsoc/install" ]
  dependencies:
    - clone_gvsoc
    - python_gvsoc


.MAGIA:
  extends: [.base]
  script:
    - make rtl-clean MAGIA_RTL_DIR=$MAGIA
    # build_mode=profile compiles the testbench profiling monitors (PROFILE_SENTINEL),
    # which emit per-tile "(<N> clock cycles)" lines for the xperf sentinel pairs.
    - make MAGIA MAGIA_RTL_DIR=$MAGIA tiles=${tiles} target_platform=${target_platform} build_mode=profile fast_sim=1
  artifacts:
    paths: [ "$MAGIA/work", "$MAGIA/sim/work", "$MAGIA/sim/modelsim.ini", "$MAGIA/scripts/sim_ret_errors.sh", "$MAGIA/scripts/compile.tcl", "$MAGIA/Makefile", "$MAGIA/hw/mesh/magia_pkg.sv", "$MAGIA/hw/tile/magia_tile_pkg.sv" ]

magia_v2_tiles_4:
  extends: .MAGIA
  stage: build_tiles_4
  variables:
    tiles: 4
    target_platform: magia_v2
  dependencies:
    - clone_magia

magia_v2_tiles_1:
  extends: .MAGIA
  stage: build_tiles_1
  variables:
    tiles: 1
    target_platform: magia_v2
  dependencies:
    - clone_magia

.build:
  extends: [.base, .export_path]
  script:
    # profile_xperf=1 compiles in the xperf cycle-profiling calls (sentinels + mcycle
    # print) so the RTL/GVSoC cycle cross-check (compare_tiles_*) has data to compare.
    - make clean build tiles=${tiles} target_platform=${target_platform} compiler=${compiler} profile_xperf=1 CMAKE=${CMAKE}
  artifacts:
    paths: [ "build", "targets/${target_platform}/include/addr_map/tile_addr_map.h" ]

build_test_magia_v2_tiles_4:
  extends: .build
  stage: build_tiles_4
  variables:
    tiles: 4
    target_platform: magia_v2
    compiler: GCC_PULP
    CMAKE: cmake-3.28.3
  dependencies:
    - python_gvsoc


build_test_magia_v2_tiles_1:
  extends: .build
  stage: build_tiles_1
  variables:
    tiles: 1
    target_platform: magia_v2
    compiler: GCC_PULP
    CMAKE: cmake-3.28.3
  dependencies:
    - python_gvsoc

.sim:
  extends: [.base, .export_path]
  script:
    - export TESTLOG="${TESTNAME##*/}"
    - make run MAGIA_RTL_DIR=$MAGIA platform=${platform} test=$TESTNAME tiles=${tiles} > $TESTLOG.rtl.log
    - ./scripts/sim_ret_errors.sh $TESTLOG.rtl.log
  artifacts:
    paths: [ "*.log" ]
    expire_in: 2 weeks

.sim_gvsoc:
  extends: [.base, .export_path]
  script:
    - export TESTLOG="${TESTNAME##*/}"
    - source gvsoc_venv/bin/activate && make run MAGIA_RTL_DIR=$MAGIA platform=${platform} test=$TESTNAME tiles=${tiles} > $TESTLOG.gvsoc.log
    - ./scripts/sim_ret_errors_gvsoc.sh $TESTLOG.gvsoc.log
  artifacts:
    paths: [ "*.log" ]
    expire_in: 2 weeks

magia_v2_tiles_4_rtl_sim:
  extends: [.sim]
  stage: test_tiles_4
  variables:
    platform: rtl
    tiles: 4
  parallel:
    matrix:
      - TESTNAME: [test_helloworld, test_fsync_levels, test_fsync_rc, test_fsync_diag, test_mm_is, test_mm_ws, test_mm_os, test_idma_2d, test_idma_1d, test_cemm_global, test_mm_is_2, test_mm_os_2, test_mm_ws_2, test_fsync_lr, test_gemv, onnx_add, onnx_ceil, onnx_clip, onnx_div, onnx_floor, onnx_relu, onnx_sub]
  dependencies:
    - clone_magia
    - magia_v2_tiles_4
    - build_test_magia_v2_tiles_4


magia_v2_tiles_4_gvsoc_sim:
  extends: [.sim_gvsoc]
  stage: test_tiles_4
  variables:
    platform: gvsoc
    tiles: 4
  parallel:
    matrix:
      - TESTNAME: [test_helloworld, test_fsync_levels, test_fsync_rc, test_fsync_diag, test_mm_is, test_mm_ws, test_mm_os, test_idma_2d, test_idma_1d, test_cemm_global, test_mm_is_2, test_mm_os_2, test_mm_ws_2, test_fsync_lr, test_gemv, onnx_add, onnx_ceil, onnx_clip, onnx_div, onnx_floor, onnx_relu, onnx_sub]
  dependencies:
    - clone_magia
    - magia_v2_tiles_4
    - clone_gvsoc
    - gvsoc_tiles_4
    - build_test_magia_v2_tiles_4
    - python_gvsoc


magia_v2_tiles_1_rtl_sim:
  extends: [.sim]
  stage: test_tiles_1
  variables:
    platform: rtl
    tiles: 1
  parallel:
    matrix:
      - TESTNAME: [test_helloworld, test_fsync_levels, test_fsync_rc, test_fsync_diag, test_mm_is, test_mm_ws, test_mm_os, test_idma_2d, test_idma_1d, test_cemm_global, test_mm_is_2, test_mm_os_2, test_mm_ws_2, test_fsync_lr, test_gemv, onnx_add, onnx_ceil, onnx_clip, onnx_div, onnx_floor, onnx_relu, onnx_sub]
  dependencies:
    - clone_magia
    - magia_v2_tiles_1
    - build_test_magia_v2_tiles_1


magia_v2_tiles_1_gvsoc_sim:
  extends: [.sim_gvsoc]
  stage: test_tiles_1
  variables:
    platform: gvsoc
    tiles: 1
  parallel:
    matrix:
      - TESTNAME: [test_helloworld, test_fsync_levels, test_fsync_rc, test_fsync_diag, test_mm_is, test_mm_ws, test_mm_os, test_idma_2d, test_idma_1d, test_cemm_global, test_mm_is_2, test_mm_os_2, test_mm_ws_2, test_fsync_lr, test_gemv, onnx_add, onnx_ceil, onnx_clip, onnx_div, onnx_floor, onnx_relu, onnx_sub]
  dependencies:
    - clone_magia
    - magia_v2_tiles_1
    - clone_gvsoc
    - gvsoc_tiles_1
    - build_test_magia_v2_tiles_1
    - python_gvsoc

# Cross-check per-tile cycle counts between RTL and GVSoC. Both sim stages emit one
# cycle number per tile per test (RTL via the testbench PROFILE_SENTINEL monitors,
# GVSoC via the xperf_end mcycle print). compare_cycles.py fails if any tile diverges
# by more than the tolerance.
.compare_cycles:
  extends: [.base]
  variables:
    COMPARE_TESTS: "test_helloworld test_fsync_levels test_fsync_rc test_fsync_diag test_fsync_lr test_idma_1d test_idma_2d test_mm_is test_mm_ws test_mm_os test_mm_is_2 test_mm_ws_2 test_mm_os_2 test_gemv"
    COMPARE_TOL: "0.05"
  script:
    - |
      rc=0
      for t in $COMPARE_TESTS; do
        python3 scripts/ci/compare_cycles.py --test "$t" --rtl "$t.rtl.log" --gvsoc "$t.gvsoc.log" --tol "$COMPARE_TOL" || rc=1
      done
      exit $rc
  artifacts:
    when: always
    paths: [ "*.log" ]
    expire_in: 2 weeks

compare_tiles_4:
  extends: [.compare_cycles]
  stage: compare_tiles_4
  dependencies:
    - magia_v2_tiles_4_rtl_sim
    - magia_v2_tiles_4_gvsoc_sim

compare_tiles_1:
  extends: [.compare_cycles]
  stage: compare_tiles_1
  dependencies:
    - magia_v2_tiles_1_rtl_sim
    - magia_v2_tiles_1_gvsoc_sim

cleanup:
  stage: postscript
  when: always
  script:
    - test -n "$CI_PIPELINE_ID"
    - rm -rf "$CI_BUILDS_DIR"/*/"$CI_PIPELINE_ID" || true

