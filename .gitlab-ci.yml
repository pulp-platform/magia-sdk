variables:
  MAGIA: './MAGIA'

.python:
  before_script:
    # Recreating Python venv at each job to avoid issues with artifacts
    - make python_ci MAGIA_DIR=$MAGIA

stages:
  - build

.base:
 artifacts:
  when: always
  expire_in: 4 week

.MAGIA:
  extends: [.base, .python]
  script:
    - make rtl-clean MAGIA_DIR=$MAGIA
    - make MAGIA MAGIA_DIR=$MAGIA tiles=${tiles} target_platform=${target_platform}
  artifacts:
    paths: [ "$MAGIA/work", "$MAGIA/sim/work", "$MAGIA/sim/modelsim.ini", "$MAGIA/scripts/sim_ret_errors.sh", "$MAGIA/scripts/compile.tcl" ]

MAGIA_V2_TILES_2:
  extends: .MAGIA
  stage: build
  variables:
    tiles: 2
    target_platform: magia_v2