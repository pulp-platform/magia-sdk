variables:
  MAGIA: './MAGIA'
  RISCV_GCC_BINROOT: /usr/pack/pulpsdk-1.0-kgf/artifactory/pulp-sdk-release/pkg/pulp_riscv_gcc/1.0.16/bin
  PYENV_BINROOT: /home/adequi/.pyenv/bin

.export_path:
  before_script:
    - export PATH=$RISCV_GCC_BINROOT:$PATH
    - export PATH=$PYENV_BINROOT:$PATH

stages:
  - clone
  - python_setup
  - build_tiles_2
  - test_tiles_2

# python_gvsoc:
#   extends: .base
#   script:
#     - conda create -n magia python=3.12 -y
#     - source activate base
#     - conda activate magia
#     - pip install .
#   artifacts:
#     paths: [ "/home/adequi/.conda/envs/magia" ]

python_gvsoc:
  extends: [.base, .export_path]
  stage: python_setup
  script:
    - eval "$(pyenv init -)"
    - pyenv local 3.12
    - python -m venv gvsoc_venv
    - source gvsoc_venv/bin/activate && pip install .
  artifacts:
    paths: [ "gvsoc_venv" ]


.base:
 artifacts:
  when: always
  expire_in: 4 week


clone-magia:
  extends: .base
  stage: clone
  script:
    - git clone https://github.com/pulp-platform/MAGIA.git
  artifacts:
    paths: [ "MAGIA" ]

clone-gvsoc:
  extends: .base
  stage: clone
  script:
    - make gvsoc_init
  artifacts:
    paths: [ "gvsoc" ]

.gvsoc:
  extends: [.base]
  script:
    - source gvsoc_venv/bin/activate && make gvsoc tiles=${tiles}
  artifacts:
    paths: [ "gvsoc/install" ]

gvsoc_tiles_2:
  extends: .gvsoc
  stage: build_tiles_2
  needs:
    - job: clone-gvsoc
      artifacts: true
    - job: python_gvsoc
      artifacts: true
  variables:
    tiles: 2
  artifacts:
    paths: [ "gvsoc/install" ]


.MAGIA:
  extends: [.base]
  script:
    - make rtl-clean MAGIA_DIR=$MAGIA
    - make MAGIA MAGIA_DIR=$MAGIA tiles=${tiles} target_platform=${target_platform} fast_sim=1
  artifacts:
    paths: [ "$MAGIA/work", "$MAGIA/sim/work", "$MAGIA/sim/modelsim.ini", "$MAGIA/scripts/sim_ret_errors.sh", "$MAGIA/scripts/compile.tcl" ]

magia_v2_tiles_2:
  extends: .MAGIA
  stage: build_tiles_2
  needs:
    - job: clone-magia
      artifacts : true
  variables:
    tiles: 2
    target_platform: magia_v2



.build:
  extends: [.base, .export_path]
  script:
    - make clean build tiles=${tiles} target_platform=${target_platform} compiler=${compiler}
  artifacts:
    paths: [ "build" ]

build_test_magia_v2_tiles_2:
  extends: .build
  stage: build_tiles_2
  variables: 
    tiles: 2
    target_platform: magia_v2
    compiler: GCC_PULP

.sim:
  extends: [.base, .export_path]
  script:
    - export TESTLOG="${TESTNAME##*/}"
    - make run MAGIA_DIR=$MAGIA platform=${platform} test=$TESTNAME tiles=${tiles} > $TESTLOG.log
    - ./scripts/sim_ret_errors.sh $TESTLOG.log
  artifacts:
    paths: [ "*.log" ]
    expire_in: 2 weeks

.sim_gvsoc:
  extends: [.base, .export_path]
  script:
    - export TESTLOG="${TESTNAME##*/}"
    - source gvsoc_venv/bin/activate && make run MAGIA_DIR=$MAGIA platform=${platform} test=$TESTNAME tiles=${tiles} > $TESTLOG.log
    - ./scripts/sim_ret_errors.sh $TESTLOG.log
  artifacts:
    paths: [ "*.log" ]
    expire_in: 2 weeks

magia_v2_tiles_2_rtl_sim:
  extends: [.sim]
  stage: test_tiles_2
  needs:
    - job: clone-magia
      artifacts: true
    - job: magia_v2_tiles_2
      artifacts: true
    - job: build_test_magia_v2_tiles_2
      artifacts: true
  variables:
    platform: rtl
    tiles: 2
  parallel:
    matrix:
      - TESTNAME: [test_helloworld, test_fsync_levels, test_fsync_rc, test_fsync_diag, test_mm_is, test_mm_ws, test_mm_os, test_idma_2d, test_idma_1d, test_cemm_global, test_mm_is_2, test_mm_os_2, test_mm_ws_2, test_fsync_lr, test_gemv]

magia_v2_tiles_2_gvsoc_sim:
  extends: [.sim_gvsoc]
  stage: test_tiles_2
  needs:
    - job: clone-magia
      artifacts: true
    - job: magia_v2_tiles_2
      artifacts: true
    - job: clone-gvsoc
      artifacts: true
    - job: gvsoc_tiles_2
      artifacts: true
    - job: build_test_magia_v2_tiles_2
      artifacts: true
    - job: python_gvsoc
      artifacts: true
  variables:
    platform: gvsoc
    tiles: 2
  parallel:
    matrix:
      - TESTNAME: [test_helloworld, test_fsync_levels, test_fsync_rc, test_fsync_diag, test_mm_is, test_mm_ws, test_mm_os, test_idma_2d, test_idma_1d, test_cemm_global, test_mm_is_2, test_mm_os_2, test_mm_ws_2, test_fsync_lr, test_gemv]


